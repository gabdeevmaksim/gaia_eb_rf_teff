# Validation configuration for Gaia → logg (Optuna-optimized)
# Run: python pipeline.py --validate --val-config config/validation/validate_gaia_logg_optuna.yaml

model:
  model_pattern: "rf_gaia_logg_optuna_*"

plots:
  test_scatter: true
  residuals: true
  performance_by_temp: true
  temp_distributions: true
  feature_importance: true
  pit_histogram: true
  crps_distribution: true
  gmm_density_map: true
  color_temp_relations: true
  color_columns:
    - column: bp_rp
      label: "BP - RP"
    - column: g_bp
      label: "G - BP"
    - column: g_rp
      label: "G - RP"

output:
  figures_subdir: "gaia_logg_optuna_validation"
  report_file: "reports/validation_report_gaia_logg_optuna.txt"

target_info:
  name: "Surface Gravity"
  unit: "dex"
  short: "logg"
