# Validation configuration for Gaia → Teff (Corrected, Log-transformed, Optuna)
# Run: python pipeline.py validate --config config/validation/validate_gaia_teff_corrected_optuna.yaml

model:
  model_pattern: "rf_gaia_teff_corrected_log_optuna_*"

plots:
  test_scatter: true
  residuals: true
  performance_by_temp: true
  temp_distributions: true
  feature_importance: true
  pit_histogram: true
  crps_distribution: true
  color_temp_relations: true
  color_columns:
    - column: bp_rp
      label: "BP - RP"
    - column: g_bp
      label: "G - BP"
    - column: g_rp
      label: "G - RP"

output:
  figures_subdir: "gaia_teff_corrected_optuna_validation"
  report_file: "reports/validation_report_gaia_teff_corrected_optuna.txt"

target_info:
  name: "Temperature"
  unit: "K"
  short: "Teff"
