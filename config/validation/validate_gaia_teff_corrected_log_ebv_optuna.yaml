# Validation configuration for Gaia → Teff (Corrected, Log, +EBV, Optuna)
# Run: python pipeline.py --validate --val-config config/validation/validate_gaia_teff_corrected_log_ebv_optuna.yaml

model:
  model_pattern: "rf_gaia_teff_corrected_log_ebv_optuna_*"

plots:
  test_scatter: false
  residuals: true
  performance_by_temp: false
  temp_distributions: false
  feature_importance: true
  pit_histogram: true
  crps_distribution: true
  color_temp_relations: false
  color_columns:
    - column: bp_rp
      label: "BP - RP"
    - column: g_bp
      label: "G - BP"
    - column: g_rp
      label: "G - RP"

output:
  figures_subdir: "gaia_teff_corrected_log_ebv_optuna_validation"
  report_file: "reports/validation_report_gaia_teff_corrected_log_ebv_optuna.txt"

target_info:
  name: "Temperature"
  unit: "K"
  short: "Teff"
